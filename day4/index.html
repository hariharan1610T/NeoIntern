<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    .g-root {
      min-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      font-family: arial, sans-serif;
      color: #202124;
      border-radius: 8px;
      overflow: hidden;
    }
    .g-topnav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      padding: 12px 16px 0;
    }
    .g-topnav a {
      font-size: 13px;
      color: #202124;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .g-topnav a:hover { background: #f0f0f0; }
    .g-signin-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 20px;
      cursor: pointer;
      font-family: arial, sans-serif;
      margin-left: 4px;
    }
    .g-signin-btn:hover { background: #1765cc; }
    .g-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px 80px;
    }
    .g-logo {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }
    .g-logo svg { width: 272px; height: 92px; }
    .g-search-wrap {
      width: 100%;
      max-width: 584px;
      margin-bottom: 28px;
    }
    .g-search-box {
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 14px;
      height: 44px;
      gap: 10px;
      background: #fff;
    }
    .g-search-box:hover, .g-search-box:focus-within {
      border-color: transparent;
      box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    }
    .g-search-icon { color: #9aa0a6; font-size: 20px; flex-shrink: 0; }
    .g-search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
      background: transparent;
      font-family: arial, sans-serif;
    }
    .g-mic-icon, .g-img-icon { color: #4285f4; font-size: 20px; cursor: pointer; flex-shrink: 0; }
    .g-btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .g-btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      font-family: arial, sans-serif;
      padding: 0 16px;
      height: 36px;
      cursor: pointer;
      white-space: nowrap;
    }
    .g-btn:hover { border-color: #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); background: #f8f9fa; }
    .g-lang {
      font-size: 13px;
      color: #4d5156;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .g-lang a { color: #1a0dab; text-decoration: none; cursor: pointer; }
    .g-lang a:hover { text-decoration: underline; }
    .g-footer {
      background: #f2f2f2;
      border-top: 1px solid #e4e4e4;
      padding: 0;
    }
    .g-footer-top {
      padding: 12px 24px;
      border-bottom: 1px solid #e4e4e4;
      font-size: 15px;
      color: #70757a;
    }
    .g-footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .g-footer-links {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .g-footer-links a {
      font-size: 13px;
      color: #70757a;
      text-decoration: none;
      padding: 4px 8px;
      cursor: pointer;
    }
    .g-footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Google homepage clone</h2>

<div class="g-root">
  <nav class="g-topnav">
    <a href="#">About</a>
    <a href="#">Store</a>
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <a href="#" aria-label="Google apps" style="font-size:20px; padding:8px;">&#8942;</a>
    <button class="g-signin-btn">Sign in</button>
  </nav>

  <main class="g-main">
    <div class="g-logo">
      <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg" aria-label="Google">
        <g transform="translate(0,8)">
          <text x="0" y="68" font-family="Product Sans,arial,sans-serif" font-size="74" font-weight="400">
            <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
          </text>
        </g>
      </svg>
    </div>

    <div class="g-search-wrap">
      <div class="g-search-box">
        <i class="ti ti-search g-search-icon" aria-hidden="true"></i>
        <input class="g-search-input" type="text" aria-label="Search" autocomplete="off" />
        <i class="ti ti-microphone g-mic-icon" aria-label="Search by voice"></i>
        <i class="ti ti-camera g-img-icon" aria-label="Search by image"></i>
      </div>
    </div>

    <div class="g-btn-row">
      <button class="g-btn">Google Search</button>
      <button class="g-btn">I'm Feeling Lucky</button>
    </div>

    <div class="g-lang">
      Google offered in:
      <a href="#">हिन्दी</a>
      <a href="#">বাংলা</a>
      <a href="#">తెలుగు</a>
      <a href="#">मराठी</a>
      <a href="#">தமிழ்</a>
      <a href="#">ગુજરાતી</a>
      <a href="#">ಕನ್ನಡ</a>
      <a href="#">മലയാളം</a>
      <a href="#">ਪੰਜਾਬੀ</a>
    </div>
  </main>

  <footer class="g-footer">
    <div class="g-footer-top">India</div>
    <div class="g-footer-bottom">
      <div class="g-footer-links">
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="g-footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>
</div>

</body>
</html>
